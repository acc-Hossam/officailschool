<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نشاط ترتيب الأرقام - رياض الأطفال</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* لمنع تحديد النص أثناء السحب للأطفال */
        }

        body {
            background: linear-gradient(145deg, #f9e7b3 0%, #f5cda0 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* الحاوية الرئيسية */
        .game-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 248, 225, 0.9);
            border-radius: 80px 80px 70px 70px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            text-align: center;
            backdrop-filter: blur(3px);
            border: 5px solid #ffb347;
        }

        h1 {
            font-size: 2rem;
            color: #d35400;
            text-shadow: 3px 3px 0 #ffe0a3;
            margin: 0 0 10px 0;
            word-break: keep-all;
        }

        .sub {
            font-size: 1.2rem;
            background: #ffecb3;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 60px;
            color: #b45f1b;
            margin-bottom: 20px;
        }

        /* الأماكن الفارغة (الحاويات الهدف) */
        .slots-area {
            background: #fff0d4;
            border-radius: 60px;
            padding: 1.5rem 1rem;
            margin: 20px 0;
            border: 3px dashed #f39c12;
        }

        .slots-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #a2580c;
            margin-bottom: 15px;
        }

        .slots-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .slot {
            width: 100px;
            height: 120px;
            background: #fef5e7;
            border: 4px solid #ffa559;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #c0392b;
            box-shadow: 0 10px 0 #e67e22;
            transition: all 0.1s ease;
            background-color: #fff3e0;
            position: relative;
        }

        .slot.empty {
            background: #fae6c3;
            border: 4px dashed #f1a23d;
            box-shadow: none;
            color: #b98f5c;
            font-size: 2rem;
        }

        .slot.filled {
            background: #ffe3b5;
            cursor: pointer;
            box-shadow: 0 5px 0 #e67e22;
            transform: translateY(2px);
        }

        /* الكروت القابلة للسحب */
        .cards-area {
            background: #ffefcf;
            border-radius: 60px;
            padding: 1rem;
            margin: 20px 0;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .card {
            width: 100px;
            height: 120px;
            background: #ffd966;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #2c3e50;
            cursor: grab;
            transition: 0.1s linear;
            box-shadow: 0 12px 0 #b45f1b;
            background: radial-gradient(circle at 30% 20%, #ffe083, #ffc857);
            border: 2px solid #ffb347;
        }

        .card:active {
            cursor: grabbing;
        }

        .card.dragging {
            opacity: 0.4;
            cursor: grabbing;
        }

        /* أزرار التحكم */
        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 10px;
        }

        button {
            background: #f39c12;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 6px 0 #b45f1b;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b45f1b;
        }

        .reset-btn {
            background: #2ecc71;
            box-shadow: 0 6px 0 #229954;
        }

        .message {
            background: #f0cf9c;
            padding: 12px;
            border-radius: 40px;
            font-size: 1.3rem;
            color: #7e4a0e;
            font-weight: bold;
            margin-top: 20px;
        }

        /* للشاشات الصغيرة */
        @media (max-width: 650px) {
            .slot, .card {
                width: 70px;
                height: 85px;
                font-size: 2.2rem;
            }
            .slots-container, .cards-container {
                gap: 12px;
            }
            button {
                padding: 8px 20px;
                font-size: 1rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 480px) {
            .slot, .card {
                width: 60px;
                height: 75px;
                font-size: 1.8rem;
            }
        }

        footer {
            font-size: 0.8rem;
            color: #a45d1a;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🧸 لعبة ترتيب الأرقام 🎈</h1>
    <div class="sub">📌 رتِّب الأرقام تصاعدياً أو تنازلياً</div>

    <!-- الأماكن الفارغة (أعلى) -->
    <div class="slots-area">
        <div class="slots-title">⬜ الأماكن الفارغة ⬜</div>
        <div class="slots-container" id="slotsContainer">
            <!-- 4 أماكن فارغة ستضاف بواسطة الجافاسكريبت -->
        </div>
        <p style="font-size: 0.9rem;">✨ انقر على الرقم في المربع لإعادته إلى الأسفل ✨</p>
    </div>

    <!-- الكروت (الأرقام العشوائية) -->
    <div class="cards-area">
        <div class="slots-title">🎴 الأرقام المتتالية (اسحب أو انقر)</div>
        <div class="cards-container" id="cardsContainer">
            <!-- الكروت ستظهر هنا ديناميكياً -->
        </div>
    </div>

    <div class="buttons">
        <button id="ascendBtn">📈 ترتيب تصاعدي (آلي)</button>
        <button id="descendBtn">📉 ترتيب تنازلي (آلي)</button>
        <button id="newGameBtn" class="reset-btn">🔄 أرقام جديدة</button>
        <button id="resetManualBtn">🧹 تفريغ الكل</button>
    </div>
    <div id="messageBox" class="message">💡 اسحب الرقم إلى المربع الفارغ أو استخدم الأزرار!</div>
    <footer>⭐ اختر أربعة أرقام متتالية و رتبها تصاعدياً أو تنازلياً</footer>
</div>

<script>
    // ----------------------------------------------
    // المتغيرات الأساسية
    let currentNumbers = [];    // الأرقام المتتالية الحالية (4 أرقام)
    let slots = [null, null, null, null];   // الأماكن الفارغة: null يعني فارغ، وإلا الرقم
    let dragSourceIndex = null;     // فهرس الكارت الذي بدأ السحب (من cards)
    let dragSourceType = null;      // 'card' أو 'slot'

    // عناصر DOM
    const slotsContainer = document.getElementById('slotsContainer');
    const cardsContainer = document.getElementById('cardsContainer');
    const ascendBtn = document.getElementById('ascendBtn');
    const descendBtn = document.getElementById('descendBtn');
    const newGameBtn = document.getElementById('newGameBtn');
    const resetManualBtn = document.getElementById('resetManualBtn');
    const messageBox = document.getElementById('messageBox');

    // دالة لتوليد 4 أرقام متتالية عشوائية (من 0 إلى 6 مثلاً لتبقى ضمن 0-9)
    function generateRandomConsecutive() {
        // نختار رقم بداية عشوائي بين 0 و 6 (بحيث آخر رقم <= 9)
        let start = Math.floor(Math.random() * 7); // 0..6  -> الأرقام: start, start+1, start+2, start+3
        return [start, start+1, start+2, start+3];
    }

    // إعادة تعيين اللعبة بأرقام جديدة
    function resetGame() {
        currentNumbers = generateRandomConsecutive();
        // خلط الأرقام في الكروت (عشوائية بحيث الطفل يرتبها)
        let shuffled = [...currentNumbers];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        currentNumbers = shuffled;  // الأرقام في الكروت تصبح بشكل عشوائي لكن محتواها نفس الأرقام المتتالية
        slots = [null, null, null, null];
        renderGame();
        showMessage("🎲 أرقام جديدة! حاول ترتيبها تصاعدياً أو تنازلياً", "#2ecc71");
    }

    // عرض رسالة
    function showMessage(msg, color = "#d35400") {
        messageBox.innerHTML = `💬 ${msg}`;
        messageBox.style.backgroundColor = "#ffefcf";
        messageBox.style.color = color;
        setTimeout(() => {
            if(messageBox.innerHTML === `💬 ${msg}`)
                messageBox.style.color = "#7e4a0e";
        }, 2000);
    }

    // التحقق من الفوز (هل كل الخانات ممتلئة بنفس الأرقام الأربعة الصحيحة بغض النظر عن الترتيب؟)
    // لكن نشاطنا يعتمد على أن الطفل يرتب بناء على طلب تصاعدي/تنازلي، لكننا نترك له الحرية.
    // سنضيف وظيفة تحقق إذا أراد التأكد هل رتب بشكل صحيح (تصاعدي مثلاً)
    function isAscendingOrder() {
        let filled = slots.filter(s => s !== null);
        if(filled.length !== 4) return false;
        // التحقق من أن الأرقام متسلسلة تصاعدياً
        for(let i=0; i<3; i++) {
            if(slots[i] === null || slots[i+1] === null) return false;
            if(slots[i] + 1 !== slots[i+1]) return false;
        }
        // أيضاً يجب أن تكون نفس مجموعة الأرقام الأصلية (لكن متتالية تكفي)
        return true;
    }

    function isDescendingOrder() {
        let filled = slots.filter(s => s !== null);
        if(filled.length !== 4) return false;
        for(let i=0; i<3; i++) {
            if(slots[i] === null || slots[i+1] === null) return false;
            if(slots[i] - 1 !== slots[i+1]) return false;
        }
        return true;
    }

    function checkWin() {
        if(isAscendingOrder()) {
            showMessage("🎉 أحسنت! رتَّبت تصاعدياً 🎉 هل تريد تحدياً جديداً؟", "#27ae60");
            return true;
        } else if(isDescendingOrder()) {
            showMessage("🏆 ممتاز! الترتيب التنازلي صحيح 🏆 أحسنت صنعاً!", "#27ae60");
            return true;
        } else if(slots.every(s => s !== null)) {
            // كل الأماكن ممتلئة لكن الترتيب ليس تصاعدياً ولا تنازلياً
            showMessage("🧸 الأماكن ممتلئة لكن الترتيب ليس تصاعدياً ولا تنازلياً.. حاول مرة أخرى! 🧸", "#e67e22");
        } else {
            // لا رسالة فوز
        }
        return false;
    }

    // تحديث واجهة المستخدم
    function renderGame() {
        // رسم الأماكن الفارغة (الـ slots)
        slotsContainer.innerHTML = '';
        for(let i=0; i<slots.length; i++) {
            const slotValue = slots[i];
            const slotDiv = document.createElement('div');
            slotDiv.classList.add('slot');
            if(slotValue === null) {
                slotDiv.classList.add('empty');
                slotDiv.innerHTML = '❓';
            } else {
                slotDiv.classList.add('filled');
                slotDiv.innerHTML = slotValue;
            }
            // إضافة خاصية السحب والحدث
            slotDiv.setAttribute('data-slot-index', i);
            slotDiv.setAttribute('draggable', 'true');
            slotDiv.addEventListener('dragstart', handleDragStartSlot);
            slotDiv.addEventListener('dragend', handleDragEnd);
            slotDiv.addEventListener('dragover', (e) => e.preventDefault());
            slotDiv.addEventListener('drop', handleDropOnSlot);
            // النقر لإعادة الرقم إلى الكروت (لطفل الحضانة سهل)
            slotDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(slotDiv.getAttribute('data-slot-index'));
                if(slots[idx] !== null) {
                    const returnedNumber = slots[idx];
                    slots[idx] = null;
                    // إضافة الرقم إلى الكروت (في آخر قائمة الكروت)
                    currentNumbers.push(returnedNumber);
                    renderGame();
                    showMessage(`↩️ أعدت الرقم ${returnedNumber} إلى الأسفل`, "#f39c12");
                    checkWin();
                }
            });
            slotsContainer.appendChild(slotDiv);
        }

        // رسم الكروت (الأرقام المتبقية)
        cardsContainer.innerHTML = '';
        currentNumbers.forEach((num, idx) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.innerHTML = num;
            card.setAttribute('data-card-index', idx);
            card.setAttribute('draggable', 'true');
            card.addEventListener('dragstart', handleDragStartCard);
            card.addEventListener('dragend', handleDragEnd);
            card.addEventListener('dragover', (e) => e.preventDefault());
            // النقر على الكارت: وضعه تلقائياً في أول مكان فارغ (للسهولة)
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                const cardIdx = parseInt(card.getAttribute('data-card-index'));
                const numberToMove = currentNumbers[cardIdx];
                // البحث عن أول مكان فارغ
                const emptySlotIndex = slots.findIndex(s => s === null);
                if(emptySlotIndex !== -1) {
                    // إزالة الرقم من الكروت
                    currentNumbers.splice(cardIdx, 1);
                    slots[emptySlotIndex] = numberToMove;
                    renderGame();
                    showMessage(`✨ وضعت الرقم ${numberToMove} في المربع رقم ${emptySlotIndex+1}`, "#3498db");
                    checkWin();
                } else {
                    showMessage("⚠️ كل الأماكن ممتلئة! أعد بعض الأرقام بالضغط عليها.", "#e67e22");
                }
            });
            cardsContainer.appendChild(card);
        });
    }

    // --- أحداث السحب من الكروت ---
    function handleDragStartCard(e) {
        const cardDiv = e.target.closest('.card');
        if(!cardDiv) return;
        const idx = parseInt(cardDiv.getAttribute('data-card-index'));
        dragSourceIndex = idx;
        dragSourceType = 'card';
        e.dataTransfer.setData('text/plain', `card-${idx}`);
        e.dataTransfer.effectAllowed = 'move';
        cardDiv.classList.add('dragging');
    }

    function handleDragStartSlot(e) {
        const slotDiv = e.target.closest('.slot');
        if(!slotDiv) return;
        const idx = parseInt(slotDiv.getAttribute('data-slot-index'));
        if(slots[idx] === null) {
            e.preventDefault();
            return false;
        }
        dragSourceIndex = idx;
        dragSourceType = 'slot';
        e.dataTransfer.setData('text/plain', `slot-${idx}`);
        e.dataTransfer.effectAllowed = 'move';
        slotDiv.classList.add('dragging');
    }

    function handleDragEnd(e) {
        // إزالة class dragging
        document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
        dragSourceIndex = null;
        dragSourceType = null;
    }

    function handleDropOnSlot(e) {
        e.preventDefault();
        const targetSlot = e.target.closest('.slot');
        if(!targetSlot) return;
        const targetIndex = parseInt(targetSlot.getAttribute('data-slot-index'));
        if(isNaN(targetIndex)) return;

        // إذا كان المصدر من الكارت
        if(dragSourceType === 'card' && dragSourceIndex !== null) {
            const numberToMove = currentNumbers[dragSourceIndex];
            if(numberToMove !== undefined) {
                if(slots[targetIndex] === null) {
                    // نقل الرقم من الكروت إلى المكان الفارغ
                    currentNumbers.splice(dragSourceIndex, 1);
                    slots[targetIndex] = numberToMove;
                    renderGame();
                    showMessage(`✔️ اسقطت الرقم ${numberToMove} في المكان ${targetIndex+1}`, "#2c3e50");
                    checkWin();
                } else {
                    showMessage("🚫 هذا المكان مشغول! اختر مكاناً فارغاً أو انقر على الرقم الموجود لإعادته.", "#c0392b");
                }
            }
        }
        // السحب من سلوت (مكان) إلى مكان آخر
        else if(dragSourceType === 'slot' && dragSourceIndex !== null) {
            const sourceNumber = slots[dragSourceIndex];
            if(sourceNumber !== null) {
                if(slots[targetIndex] === null) {
                    // نقل الرقم من سلوت إلى سلوت آخر
                    slots[targetIndex] = sourceNumber;
                    slots[dragSourceIndex] = null;
                    renderGame();
                    showMessage(`🔄 نقلت الرقم ${sourceNumber} من خانة إلى أخرى`, "#e67e22");
                    checkWin();
                } else {
                    showMessage("الهدف مشغول، لا يمكن المبادلة بهذه الطريقة. استخدم النقر للإعادة أولاً.", "#c0392b");
                }
            }
        } else {
            showMessage("👈 اسحب الكروت من الأسفل أو انقر عليها", "#f1c40f");
        }
        dragSourceIndex = null;
        dragSourceType = null;
    }

    // الترتيب التصاعدي آلياً (مساعدة تعليمية)
    function autoAscending() {
        const allNumbers = [...slots.filter(s => s !== null), ...currentNumbers];
        if(allNumbers.length !== 4) {
            showMessage("⚠️ يجب أن تكون كل الأرقام موجودة (لا تفقد أي رقم)! اضغط تفريغ الكل أولاً.", "#e67e22");
            return;
        }
        const sorted = [...allNumbers].sort((a,b) => a-b);
        slots = [...sorted];
        currentNumbers = [];
        renderGame();
        showMessage("🌟 تم الترتيب تصاعدياً تلقائياً! لاحظ الترتيب من الأصغر للأكبر.", "#2ecc71");
        checkWin();
    }

    function autoDescending() {
        const allNumbers = [...slots.filter(s => s !== null), ...currentNumbers];
        if(allNumbers.length !== 4) {
            showMessage("⚠️ يجب استعادة جميع الأرقام (اضغط تفريغ الكل)", "#e67e22");
            return;
        }
        const sorted = [...allNumbers].sort((a,b) => b-a);
        slots = [...sorted];
        currentNumbers = [];
        renderGame();
        showMessage("🎈 تم الترتيب تنازلياً تلقائياً! من الأكبر إلى الأصغر.", "#3498db");
        checkWin();
    }

    function resetManual() {
        // إعادة كل الأرقام من slots إلى currentNumbers
        const allNumbers = [...slots.filter(s => s !== null), ...currentNumbers];
        if(allNumbers.length !== 4) {
            // في حالة وجود خطأ نعيد تحميل الأرقام الأصلية
            resetGame();
            return;
        }
        // خلط الأرقام عشوائياً في الكروت
        for (let i = allNumbers.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allNumbers[i], allNumbers[j]] = [allNumbers[j], allNumbers[i]];
        }
        currentNumbers = allNumbers;
        slots = [null, null, null, null];
        renderGame();
        showMessage("🧽 تم تفريغ جميع الأماكن! الآن رتب بنفسك 🧽", "#f39c12");
    }

    // ربط الأزرار
    ascendBtn.addEventListener('click', autoAscending);
    descendBtn.addEventListener('click', autoDescending);
    newGameBtn.addEventListener('click', resetGame);
    resetManualBtn.addEventListener('click', resetManual);

    // منع السلوك الافتراضي للسحب على الصفحة
    window.addEventListener('dragstart', (e) => {
        if(!e.target.closest('.card') && !e.target.closest('.slot')) {
            e.preventDefault();
        }
    });

    // بدء اللعبة
    resetGame();
</script>
</body>
</html>
