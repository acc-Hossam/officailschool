<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🃏 كروت تعليمية للأطفال - بطاقات الكلمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-1: #6C63FF;
            --bg-2: #3F51B5;
            --bg-3: #7986CB;
            --card-math-1: #FF6B6B;
            --card-math-2: #FF8E53;
            --card-vocab-1: #4ECDC4;
            --card-vocab-2: #44B09E;
            --text-dark: #2D3436;
            --text-light: #FFFFFF;
            --gold: #FFD93D;
            --pink: #FF6B9D;
            --green: #6BCB77;
            --blue: #4D96FF;
            --purple: #9B59B6;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            font-family: 'Changa', 'Segoe UI', cursive, sans-serif;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== Floating Particles ===== */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.12;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(110vh) rotate(0deg) scale(1); opacity: 0; }
            5% { opacity: 0.12; }
            95% { opacity: 0.12; }
            100% { transform: translateY(-50px) rotate(360deg) scale(0.5); opacity: 0; }
        }

        /* ===== Sparkle Effect ===== */
        .sparkle-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .sparkle {
            position: absolute;
            font-size: 1.5rem;
            animation: sparkleAnim 1.2s ease-out forwards;
            pointer-events: none;
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        /* ===== Main Container ===== */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* ===== Header ===== */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
            margin: 0 0 5px 0;
            animation: headerBounce 2s ease-in-out infinite;
        }

        @keyframes headerBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.02); }
        }

        .header .subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        /* ===== Sound Toggle ===== */
        .top-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .sound-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 1.3rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .sound-btn:active {
            transform: scale(0.9);
        }

        /* ===== Section Title ===== */
        .section {
            margin-bottom: 30px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 18px;
        }

        .section-title h2 {
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
            margin: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            padding: 8px 25px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        .section-title p {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            margin: 5px 0 0;
            font-weight: 600;
        }

        /* ===== Cards Grid ===== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            padding: 0 5px;
        }

        /* ===== Flip Card ===== */
        .flip-card {
            perspective: 1000px;
            height: 280px;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow: hidden;
        }

        .flip-card-front {
            background: white;
            box-shadow:
                0 10px 30px rgba(0,0,0,0.15),
                0 0 0 3px rgba(255,255,255,0.3);
        }

        .flip-card-back {
            transform: rotateY(180deg);
            box-shadow:
                0 10px 30px rgba(0,0,0,0.15),
                0 0 0 3px rgba(255,255,255,0.3);
            color: white;
        }

        /* Math Cards Back Colors */
        .flip-card.math-ascending .flip-card-back { background: linear-gradient(145deg, #FF6B6B, #EE5A24); }
        .flip-card.math-descending .flip-card-back { background: linear-gradient(145deg, #F39C12, #E67E22); }
        .flip-card.math-greater .flip-card-back { background: linear-gradient(145deg, #6BCB77, #27AE60); }
        .flip-card.math-smaller .flip-card-back { background: linear-gradient(145deg, #4D96FF, #2980B9); }
        .flip-card.math-equals .flip-card-back { background: linear-gradient(145deg, #9B59B6, #8E44AD); }

        /* Vocab Cards Back Colors */
        .flip-card.vocab-butcher .flip-card-back { background: linear-gradient(145deg, #E74C3C, #C0392B); }
        .flip-card.vocab-carpenter .flip-card-back { background: linear-gradient(145deg, #E67E22, #D35400); }
        .flip-card.vocab-seamstress .flip-card-back { background: linear-gradient(145deg, #FF6B9D, #E91E63); }
        .flip-card.vocab-cabbage .flip-card-back { background: linear-gradient(145deg, #6BCB77, #27AE60); }
        .flip-card.vocab-pumpkin .flip-card-back { background: linear-gradient(145deg, #F39C12, #E67E22); }
        .flip-card.vocab-jet .flip-card-back { background: linear-gradient(145deg, #4D96FF, #2980B9); }
        .flip-card.vocab-seeds .flip-card-back { background: linear-gradient(145deg, #A0522D, #8B4513); }
        .flip-card.vocab-leaves .flip-card-back { background: linear-gradient(145deg, #2ECC71, #1ABC9C); }

        /* ===== Card Front Content ===== */
        .card-emoji {
            font-size: 3.5rem;
            margin-bottom: 8px;
            animation: emojiBounce 2s ease-in-out infinite;
        }

        @keyframes emojiBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .card-image {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 8px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.15));
            animation: emojiBounce 2.5s ease-in-out infinite;
        }

        .card-english {
            font-size: 1.3rem;
            font-weight: 800;
            color: #2D3436;
            text-align: center;
        }

        .card-hint {
            font-size: 0.7rem;
            color: #B2BEC3;
            margin-top: 6px;
            font-weight: 600;
            background: #F8F9FA;
            padding: 3px 12px;
            border-radius: 20px;
        }

        /* ===== Card Back Content ===== */
        .card-arabic {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            line-height: 1.5;
        }

        .card-symbol {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 5px 0;
        }

        .card-back-hint {
            font-size: 0.75rem;
            opacity: 0.85;
            margin-top: 8px;
            background: rgba(255,255,255,0.2);
            padding: 3px 12px;
            border-radius: 20px;
        }

        /* ===== Hover Effects ===== */
        .flip-card:hover .flip-card-front {
            box-shadow:
                0 15px 40px rgba(0,0,0,0.2),
                0 0 0 4px rgba(255,255,255,0.5);
            transform: translateY(-3px);
        }

        .flip-card:hover .flip-card-back {
            box-shadow:
                0 15px 40px rgba(0,0,0,0.2),
                0 0 0 4px rgba(255,255,255,0.5);
        }

        /* ===== Speaking Animation ===== */
        .flip-card.speaking .flip-card-front,
        .flip-card.speaking .flip-card-back {
            animation: speakPulse 0.4s ease-in-out 3;
        }

        @keyframes speakPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* ===== Tap Ripple ===== */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* ===== Responsive ===== */
        @media (max-width: 700px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .flip-card {
                height: 240px;
            }

            .header h1 {
                font-size: 1.6rem;
            }

            .card-emoji {
                font-size: 2.8rem;
            }

            .card-image {
                width: 80px;
                height: 80px;
            }

            .card-english {
                font-size: 1.1rem;
            }

            .card-arabic {
                font-size: 1.4rem;
            }

            .card-symbol {
                font-size: 2rem;
            }

            .section-title h2 {
                font-size: 1.3rem;
                padding: 6px 18px;
            }
        }

        @media (max-width: 420px) {
            body {
                padding: 8px;
            }

            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .flip-card {
                height: 210px;
            }

            .flip-card-front, .flip-card-back {
                padding: 10px;
                border-radius: 18px;
            }

            .header h1 {
                font-size: 1.3rem;
            }

            .card-emoji {
                font-size: 2.2rem;
            }

            .card-image {
                width: 65px;
                height: 65px;
            }

            .card-english {
                font-size: 0.95rem;
            }

            .card-arabic {
                font-size: 1.2rem;
            }

            .card-symbol {
                font-size: 1.7rem;
            }

            .card-hint {
                font-size: 0.6rem;
            }
        }

        @media (min-width: 900px) {
            .cards-grid {
                grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            }

            .flip-card {
                height: 300px;
            }
        }
    </style>
</head>

</div>

    // ===== State =====
    let soundEnabled = true;
    let isSpeaking = false;

    // ===== Create Particles =====
    function createParticles() {
        const container = document.getElementById('particles');
        const colors = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF', '#FF6B9D', '#9B59B6', '#FF8E53', '#4ECDC4'];
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 60 + 25;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            p.style.animationDuration = (Math.random() * 18 + 12) + 's';
            p.style.animationDelay = (Math.random() * 12) + 's';
            container.appendChild(p);
        }
    }

    // ===== Sparkle Effect =====
    function createSparkle(x, y) {
        const container = document.getElementById('sparkleContainer');
        const emojis = ['✨', '⭐', '💫', '🌟'];
        for (let i = 0; i < 6; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            s.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
            s.style.top = (y + (Math.random() - 0.5) * 80) + 'px';
            s.style.animationDelay = (Math.random() * 0.3) + 's';
            container.appendChild(s);
            setTimeout(() => s.remove(), 1500);
        }
    }

    // ===== Speech =====
    function speakText(text, lang, callback) {
        if (!window.speechSynthesis || !soundEnabled) {
            if (callback) callback();
            return;
        }
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang;
        u.rate = 0.85;
        u.pitch = 1.1;
        if (callback) u.onend = callback;
        window.speechSynthesis.speak(u);
    }

    function speakCard(englishText, arabicText, cardEl) {
        if (isSpeaking) {
            window.speechSynthesis.cancel();
        }
        isSpeaking = true;
        cardEl.classList.add('speaking');
        speakText(englishText, "en-US", () => {
            speakText(arabicText, "ar-SA", () => {
                isSpeaking = false;
                cardEl.classList.remove('speaking');
            });
        });
    }

    // ===== Toggle Sound =====
    function toggleSound() {
        soundEnabled = !soundEnabled;
        document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
        if (!soundEnabled) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            document.querySelectorAll('.flip-card.speaking').forEach(c => c.classList.remove('speaking'));
        }
    }

    // ===== Build Cards =====
    function buildMathCards() {
        const grid = document.getElementById('mathGrid');
        mathCards.forEach((card, index) => {
            const el = document.createElement('div');
            el.className = 'flip-card ' + card.cssClass;
            el.style.animationDelay = (index * 0.1) + 's';
            el.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-card-front">
                        <div class="card-emoji">${card.emoji}</div>
                        <div class="card-english">${card.english}</div>
                        <div class="card-hint">👆 اضغط للقلب</div>
                    </div>
                    <div class="flip-card-back">
                        <div class="card-arabic">${card.arabic}</div>
                        ${card.arabicDetail ? '<div class="card-arabic" style="font-size:1rem;opacity:0.9;margin-top:4px">' + card.arabicDetail + '</div>' : ''}
                        ${card.symbol ? '<div class="card-symbol">' + card.symbol + '</div>' : ''}
                        <div class="card-back-hint">🔊 انجليزي ثم عربي</div>
                    </div>
                </div>
            `;

            el.addEventListener('click', (e) => {
                el.classList.toggle('flipped');
                speakCard(card.englishSpeech, card.arabicSpeech, el);
                createSparkle(e.clientX, e.clientY);
            });

            grid.appendChild(el);
        });
    }

    function buildVocabCards() {
        const grid = document.getElementById('vocabGrid');
        vocabCards.forEach((card, index) => {
            const el = document.createElement('div');
            el.className = 'flip-card ' + card.cssClass;
            el.style.animationDelay = (index * 0.1) + 's';
            el.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-card-front">
                        <img class="card-image" src="${card.image}" alt="${card.english}">
                        <div class="card-english">${card.english}</div>
                        <div class="card-hint">👆 اضغط للقلب</div>
                    </div>
                    <div class="flip-card-back">
                        <div class="card-arabic">${card.arabic}</div>
                        <div class="card-back-hint">🔊 انجليزي ثم عربي</div>
                    </div>
                </div>
            `;

            el.addEventListener('click', (e) => {
                el.classList.toggle('flipped');
                speakCard(card.englishSpeech, card.arabicSpeech, el);
                createSparkle(e.clientX, e.clientY);
            });

            grid.appendChild(el);
        });
    }

    // ===== Init =====
    createParticles();
    buildMathCards();
    buildVocabCards();
</script>

</body>
</html>
