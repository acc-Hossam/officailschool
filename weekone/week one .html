<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>دروس تفاعلية | العد بالكرات والعصفور المتحرك</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a2f2a, #04382c);
            font-family: 'Tajawal', 'Amiri', serif;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .presentation-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 248, 225, 0.96);
            border-radius: 64px 48px;
            box-shadow: 0 35px 60px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid #e9c891;
        }
        .islamic-header {
            background: #1e3a2f;
            padding: 1rem 2rem;
            text-align: center;
            border-bottom: 4px solid #d4af37;
        }
        .islamic-header h2 {
            color: #f9eec1;
            font-family: 'Amiri', serif;
            font-weight: 700;
            font-size: 1.8rem;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }
        .slide-area {
            padding: 2rem;
            min-height: 560px;
            background: #fffef7;
        }
        .slide-card {
            background: linear-gradient(135deg, #ffffff, #fef7e0);
            border-radius: 48px;
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            border-right: 8px solid #c2a155;
            animation: slideFadeUp 0.5s ease forwards;
        }
        @keyframes slideFadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .section-title {
            font-size: 1.9rem;
            font-weight: 800;
            color: #2d5a3b;
            border-right: 6px solid #e6b45e;
            padding-right: 1rem;
            margin-bottom: 1.5rem;
            display: inline-block;
        }
        /* تنسيق شريحة الرياضيات */
        .math-container {
            text-align: center;
        }
        .number-box {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 2rem 0;
        }
        .num-card {
            background: #fef2dc;
            width: 130px;
            padding: 1.2rem;
            border-radius: 60px;
            text-align: center;
            font-size: 2.8rem;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            box-shadow: 0 8px 12px rgba(0,0,0,0.1);
            border: 2px solid #e9c284;
        }
        .num-card:hover {
            transform: scale(1.05);
            background: #ffefc0;
        }
        .balls-animation-area {
            background: #e9dbc2;
            border-radius: 70px;
            padding: 1.5rem;
            margin-top: 1rem;
            text-align: center;
            min-height: 180px;
        }
        .ball-counter {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2b5e42;
            margin-bottom: 15px;
            background: #fff2df;
            display: inline-block;
            padding: 0.3rem 1.5rem;
            border-radius: 40px;
        }
        .balls-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
            align-items: center;
        }
        .ball-item {
            font-size: 2.5rem;
            animation: bounceIn 0.3s ease forwards;
            display: inline-block;
        }
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        /* تصميم بطاقات المفردات */
        .vocab-double-slide {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
        }
        .vocab-card-new {
            flex: 1;
            min-width: 280px;
            background-size: cover;
            background-position: center;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.25);
            transition: transform 0.3s ease;
        }
        .vocab-card-new:hover {
            transform: translateY(-8px);
        }
        .card-overlay {
            background: rgba(30, 40, 25, 0.7);
            backdrop-filter: blur(4px);
            padding: 1.8rem 1.2rem;
            border-radius: 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            min-height: 320px;
            justify-content: center;
        }
        .word-buttons {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .btn-audio {
            background: #fef5e0;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Tajawal', sans-serif;
        }
        .btn-audio.arabic {
            background: #2b5e42;
            color: white;
            border-bottom: 3px solid #d4af37;
        }
        .btn-audio.english {
            background: #c9a87b;
            color: #1e3a2f;
        }
        .btn-audio:hover {
            transform: scale(1.03);
        }
        .word-title {
            font-size: 1.7rem;
            font-weight: bold;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
            color: white;
            text-align: center;
        }
        /* شريحة العصفور */
        .position-card {
            background: #fff2e0;
            border-radius: 30px;
            padding: 0.8rem;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            width: 130px;
        }
        .position-card:hover { background: #ffefdb; transform: translateY(-3px);}
        .scene {
            position: relative;
            background: #fdf8ef;
            border-radius: 40px;
            padding: 2rem;
            min-height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #e9d6b0;
        }
        .box {
            width: 150px;
            height: 150px;
            background: #d4a373;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 10px 0 #8b5a2b;
            z-index: 2;
            position: relative;
        }
        .bird {
            position: absolute;
            font-size: 3.8rem;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
            z-index: 20;
            pointer-events: none;
        }
        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .pos-btn {
            background: #e6c99c;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .pos-btn:hover { background: #d4b076; transform: scale(1.02);}
        .nav-controls {
            background: #e7dbbd;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-nav {
            background: #2b5e42;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-nav:hover:not(:disabled) { background: #a9712c; }
        .btn-nav:disabled { opacity: 0.5; cursor: default; }
        .page-indicator {
            background: #fff0cf;
            padding: 5px 20px;
            border-radius: 40px;
            font-weight: bold;
        }
        .slide-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .dot {
            width: 10px;
            height: 10px;
            background: #cbb775;
            border-radius: 50%;
            cursor: pointer;
        }
        .dot.active { background: #2b5e42; width: 24px; border-radius: 20px; }
        .quiz-link-btn {
            background: #d4a373;
            color: #1e3a2f;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 20px;
        }
        footer {
            text-align: center;
            background: #fff4e4;
            padding: 0.6rem;
            font-size: 0.8rem;
            color: #9b7a48;
        }
        @media (max-width: 750px) {
            .num-card { width: 100px; font-size: 2rem; }
            .ball-item { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="presentation-container">
    <div class="islamic-header">
        <h2><i class="fas fa-chalkboard-user"></i> حقيبة المتعلم التفاعلية <i class="fas fa-star-of-life"></i></h2>
    </div>
    <div class="slide-area" id="slideArea">
        <div id="slideContent" class="slide-card"></div>
        <div class="slide-dots" id="dotsContainer"></div>
    </div>
    <div class="nav-controls">
        <button class="btn-nav" id="prevBtn"><i class="fas fa-chevron-right"></i> السابق</button>
        <div class="page-indicator"><span id="currentIdx">1</span> / <span id="totalIdx">13</span></div>
        <div style="display: flex; gap: 12px;">
            <button class="quiz-link-btn" id="goToQuizBtn"><i class="fas fa-question-circle"></i> اختبار شامل</button>
            <button class="btn-nav" id="nextBtn">التالي <i class="fas fa-chevron-left"></i></button>
        </div>
    </div>
    <footer>﴿ وَقُل رَّبِّ زِدْنِي عِلْمًا ﴾ | اضغط على الأرقام لرؤية الكرات تتوالى | العصفور يتحرك بحرية</footer>
</div>

<script>
    // دالة النطق
    function speakText(text, lang = 'ar') {
        if (!window.speechSynthesis) return;
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = 0.85;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    // ===================== بيانات الشرائح =====================
    // المفردات 16 كلمة (8 شرائح)
    const exactWords = [
        { en: "Home", ar: "منزل", img: "https://img.icons8.com/fluency/400/home.png" },
        { en: "bedroom", ar: "غرفة نوم", img: "https://img.icons8.com/fluency/400/bedroom.png" },
        { en: "bathroom", ar: "حمام", img: "https://img.icons8.com/fluency/400/bathroom.png" },
        { en: "living room", ar: "غرفة المعيشة", img: "https://img.icons8.com/fluency/400/living-room.png" },
        { en: "Kitchen", ar: "مطبخ", img: "https://img.icons8.com/fluency/400/kitchen.png" },
        { en: "Bed", ar: "سرير", img: "https://img.icons8.com/fluency/400/bed.png" },
        { en: "metal", ar: "معدن", img: "https://img.icons8.com/fluency/400/metal.png" },
        { en: "fabric", ar: "قماش", img: "https://img.icons8.com/fluency/400/fabric.png" },
        { en: "paper", ar: "ورق", img: "https://img.icons8.com/fluency/400/paper.png" },
        { en: "wood", ar: "خشب", img: "https://img.icons8.com/fluency/400/wood.png" },
        { en: "plastic", ar: "بلاستيك", img: "https://img.icons8.com/fluency/400/plastic.png" },
        { en: "push", ar: "دفع", img: "https://img.icons8.com/fluency/400/push.png" },
        { en: "pull", ar: "سحب", img: "https://img.icons8.com/fluency/400/pull.png" },
        { en: "Toys", ar: "العاب", img: "https://img.icons8.com/fluency/400/toys.png" },
        { en: "doll", ar: "عروسة", img: "https://img.icons8.com/fluency/400/doll.png" },
        { en: "teddybear", ar: "دبدوب", img: "https://img.icons8.com/fluency/400/teddy-bear.png" }
    ];
    const vocabularySlides = [];
    for (let i = 0; i < exactWords.length; i += 2) {
        vocabularySlides.push([exactWords[i], exactWords[i+1]]);
    }
    
    const slides = [
        { type: "hadith", content: { text: "من صام رمضان إيمانا وأحتسابا غفر له ما تقدم من ذنبه وما تأخر", narrator: "رواه البخاري ومسلم" } },
        { type: "arabicLetters", data: { letters: ["ف","ك","ق"], harakat: { ف: ["فَ","فِ","فُ"], ك: ["كَ","كِ","كُ"], ق: ["قَ","قِ","قُ"] }, words: ["قفْل","مكْتبة","طقْس","عُقْد"] } },
        { type: "math", numbers: [14,15,16] },
        { type: "positionsWithBird", items: [{en:"Infront of", ar:"أمام", key:"front"},{en:"Behind", ar:"خلف", key:"behind"},{en:"Below", ar:"تحت", key:"below"},{en:"Above", ar:"أعلى", key:"above"}] },
        { type: "lettersPQR", letters: ["Pp","Qq","Rr"] },
    ];
    for(let i=0; i<vocabularySlides.length; i++) {
        slides.push({ type: "vocabDouble", pair: vocabularySlides[i] });
    }
    
    let currentSlide = 0;
    const total = slides.length;
    const slideContainer = document.getElementById("slideContent");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const currentSpan = document.getElementById("currentIdx");
    const totalSpan = document.getElementById("totalIdx");
    const dotsDiv = document.getElementById("dotsContainer");
    const quizBtn = document.getElementById("goToQuizBtn");
    
    function updateUI() {
        currentSpan.innerText = currentSlide+1;
        totalSpan.innerText = total;
        prevBtn.disabled = currentSlide === 0;
        nextBtn.disabled = currentSlide === total-1;
        renderDots();
    }
    function renderDots() {
        dotsDiv.innerHTML = '';
        for(let i=0; i<total; i++) {
            let dot = document.createElement('div');
            dot.classList.add('dot');
            if(i===currentSlide) dot.classList.add('active');
            dot.addEventListener('click',()=>{ if(i!==currentSlide){ currentSlide=i; renderSlide(); updateUI(); } });
            dotsDiv.appendChild(dot);
        }
    }
    
    // ============= دوال عرض الشرائح =============
    function renderHadith(slide) {
        return `<div style="text-align:center">
                    <i class="fas fa-mosque" style="font-size:3rem; color:#b8860b;"></i>
                    <div style="background:#fef5e0; border-radius:50px; padding:1.5rem; margin:1rem 0;">
                        <p style="font-size:1.3rem;">قال رسول الله ﷺ</p>
                        <p style="font-size:1.8rem; font-weight:bold;">“${slide.content.text}”</p>
                        <p>ﷺ</p>
                    </div>
                    <div><i class="fas fa-book"></i> ${slide.content.narrator}</div>
                    <div style="margin-top:15px;">صدق رسول الله صلى الله عليه وسلم</div>
                </div>`;
    }
    
    function renderArabicLetters(slide) {
        let lettersHtml = `<div><div class="section-title"><i class="fas fa-pen"></i> الحروف مع الحركات</div><div style="display:flex; flex-wrap:wrap; gap:2rem; justify-content:center; margin:2rem 0;">`;
        const lettersArr = slide.data.letters;
        const harakatMap = slide.data.harakat;
        lettersArr.forEach(let => {
            let forms = harakatMap[let].map(h => `<span style="background:#efe2cf; padding:0.5rem 1rem; border-radius:40px; margin:0 5px; font-size:1.8rem;">${h}</span>`).join('');
            lettersHtml += `<div style="background:#fff2e2; border-radius:36px; padding:1rem; text-align:center; min-width:140px;"><div style="font-size:2.5rem; font-weight:bold;">${let}</div><div>${forms}</div></div>`;
        });
        lettersHtml += `</div><div class="section-title">📖 كلمات تطبيقية</div><div style="display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;">`;
        slide.data.words.forEach(w => { lettersHtml += `<div style="background:#f4e8d8; padding:0.5rem 1.2rem; border-radius:40px; cursor:pointer;" onclick="speakText('${w}','ar')">${w}</div>`; });
        lettersHtml += `</div></div>`;
        return lettersHtml;
    }
    
    // شريحة الرياضيات المحسنة: كرة بعد كرة مع عد متحرك
    function renderMathSlide() {
        return `<div class="math-container">
                    <div class="section-title">🔢 الأعداد وتمثيلها بالكرات</div>
                    <div class="number-box">
                        <div class="num-card" data-num="14">14</div>
                        <div class="num-card" data-num="15">15</div>
                        <div class="num-card" data-num="16">16</div>
                    </div>
                    <div class="balls-animation-area" id="ballsArea">
                        <div class="ball-counter" id="counterDisplay">⚽ اختر رقماً لعرض الكرات</div>
                        <div id="ballsContainer" class="balls-row"></div>
                    </div>
                </div>`;
    }
    
    // دالة عرض الكرات بشكل تسلسلي
    window.animateBalls = function(number) {
        const container = document.getElementById('ballsContainer');
        const counterSpan = document.getElementById('counterDisplay');
        if(!container) return;
        container.innerHTML = '';
        counterSpan.innerHTML = `🔄 جاري العد حتى ${number} كرة ...`;
        let i = 0;
        const ballsArray = [];
        function addNextBall() {
            if(i < number) {
                const ballSpan = document.createElement('span');
                ballSpan.className = 'ball-item';
                ballSpan.innerHTML = '⚽';
                container.appendChild(ballSpan);
                ballsArray.push(ballSpan);
                counterSpan.innerHTML = `✅ ${i+1} / ${number} كرة`;
                i++;
                setTimeout(addNextBall, 100);
            } else {
                counterSpan.innerHTML = `🎉 ${number} كرة 🎉`;
            }
        }
        addNextBall();
    };
    
    // شريحة العصفور (حركة فورية عند الضغط)
    function renderPositionsWithBird(slide) {
        const items = slide.items;
        let btnsHtml = items.map(item => `<button class="pos-btn" data-pos="${item.key}">${item.en} (${item.ar})</button>`).join('');
        let cardsHtml = items.map(item => `<div class="position-card" data-pos="${item.key}"><i class="fas ${item.key==='front'?'fa-arrow-right':(item.key==='behind'?'fa-arrow-left':(item.key==='below'?'fa-arrow-down':'fa-arrow-up'))}"></i><p>${item.en}<br>${item.ar}</p></div>`).join('');
        
        return `<div>
                    <div class="section-title"><i class="fas fa-map-pin"></i> أين العصفور؟ اضغط لتغيير وضعه</div>
                    <div style="display:flex; justify-content:center; gap:1rem; flex-wrap:wrap; margin-bottom:1rem;">${cardsHtml}</div>
                    <div class="position-demo">
                        <div class="scene" id="positionScene">
                            <div class="box">📦 صندوق</div>
                            <div class="bird" id="animatedBird">🐦</div>
                        </div>
                        <div class="control-buttons" id="posButtons">${btnsHtml}</div>
                        <p style="margin-top:1rem; color:#a5651e;"><i class="fas fa-hand-pointer"></i> اضغط على الزر أو البطاقة لتحريك العصفور</p>
                    </div>
                </div>`;
    }
    
    function renderLettersPQR(slide) {
        return `<div><div class="section-title">🔤 الحروف الإنجليزية</div>
                <div style="display:flex; justify-content:center; gap:2rem; margin:2rem 0;">
                    ${slide.letters.map(l => `<div style="background:#eddabc; padding:1rem 2rem; border-radius:60px; font-size:3rem; font-weight:bold; cursor:pointer;" onclick="speakText('${l}','en')">${l}</div>`).join('')}
                </div>
                <div class="balls-animation-area" style="background:#e9dbc2; text-align:center; padding:1rem;">🔊 اضغط على الحرف لسماع النطق</div>
                </div>`;
    }
    
    function renderVocabDouble(slide) {
        const pair = slide.pair;
        let cardsHtml = '';
        for(let item of pair) {
            if(!item) continue;
            cardsHtml += `
                <div class="vocab-card-new" style="background-image: url('${item.img}'); background-size: cover; background-position: center;">
                    <div class="card-overlay">
                        <div class="word-title english-word">${item.en}</div>
                        <div class="word-title arabic-word">${item.ar}</div>
                        <div class="word-buttons">
                            <button class="btn-audio english" onclick="event.stopPropagation(); speakText('${item.en}', 'en')">
                                <i class="fas fa-volume-up"></i> English
                            </button>
                            <button class="btn-audio arabic" onclick="event.stopPropagation(); speakText('${item.ar}', 'ar')">
                                <i class="fas fa-volume-up"></i> العربية
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        return `<div><div class="section-title"><i class="fas fa-image"></i> المفردات المصورة</div>
                <div class="vocab-double-slide">${cardsHtml}</div>
                <p style="text-align:center;"><i class="fas fa-headphones"></i> اضغط على الزر لسماع النطق</p>
                </div>`;
    }
    
    // رندر شامل
    function renderSlide() {
        let slide = slides[currentSlide];
        let html = "";
        if(slide.type === "hadith") html = renderHadith(slide);
        else if(slide.type === "arabicLetters") html = renderArabicLetters(slide);
        else if(slide.type === "math") html = renderMathSlide();
        else if(slide.type === "positionsWithBird") html = renderPositionsWithBird(slide);
        else if(slide.type === "lettersPQR") html = renderLettersPQR(slide);
        else if(slide.type === "vocabDouble") html = renderVocabDouble(slide);
        
        slideContainer.style.animation = 'none';
        slideContainer.innerHTML = html;
        setTimeout(()=> slideContainer.style.animation = '', 20);
        
        // إضافة أحداث الرياضيات
        if(slide.type === "math") {
            const cards = document.querySelectorAll('.num-card');
            cards.forEach(card => {
                const num = parseInt(card.getAttribute('data-num'));
                card.onclick = () => {
                    window.animateBalls(num);
                    speakText(`${num} كرة`, 'ar');
                };
            });
        }
        
        // إضافة أحداث العصفور
        if(slide.type === "positionsWithBird") {
            // تعريف دالة تحريك العصفور بشكل مباشر
            window.moveBird = function(position) {
                const bird = document.getElementById('animatedBird');
                const scene = document.getElementById('positionScene');
                if(!bird || !scene) return;
                const box = document.querySelector('.box');
                const boxRect = box.getBoundingClientRect();
                const sceneRect = scene.getBoundingClientRect();
                // نستخدم إحداثيات نسبية داخل المشهد
                const boxCenterX = box.offsetLeft + box.offsetWidth/2;
                const boxCenterY = box.offsetTop + box.offsetHeight/2;
                if(position === 'front') {
                    bird.style.left = `${boxCenterX - 25}px`;
                    bird.style.top = `${boxCenterY + 70}px`;
                    bird.style.transform = 'translateX(-50%)';
                    bird.style.filter = 'none';
                    bird.style.zIndex = '30';
                } else if(position === 'behind') {
                    bird.style.left = `${boxCenterX - 25}px`;
                    bird.style.top = `${boxCenterY - 20}px`;
                    bird.style.transform = 'translateX(-50%)';
                    bird.style.filter = 'brightness(0.5) blur(1.5px)';
                    bird.style.zIndex = '1';
                } else if(position === 'below') {
                    bird.style.left = `${boxCenterX - 25}px`;
                    bird.style.top = `${boxCenterY + 85}px`;
                    bird.style.transform = 'translateX(-50%)';
                    bird.style.filter = 'none';
                    bird.style.zIndex = '30';
                } else if(position === 'above') {
                    bird.style.left = `${boxCenterX - 25}px`;
                    bird.style.top = `${boxCenterY - 80}px`;
                    bird.style.transform = 'translateX(-50%)';
                    bird.style.filter = 'none';
                    bird.style.zIndex = '30';
                }
                bird.style.position = 'absolute';
            };
            
            // ربط الأزرار والبطاقات
            setTimeout(() => {
                const btns = document.querySelectorAll('.pos-btn');
                const cardsPos = document.querySelectorAll('.position-card');
                const moveAndSpeak = (pos) => {
                    let text = '';
                    if(pos === 'front') text = 'Infront of أمام';
                    else if(pos === 'behind') text = 'Behind خلف';
                    else if(pos === 'below') text = 'Below تحت';
                    else if(pos === 'above') text = 'Above أعلى';
                    window.moveBird(pos);
                    speakText(text, 'en');
                };
                btns.forEach(btn => {
                    const pos = btn.getAttribute('data-pos');
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        moveAndSpeak(pos);
                    };
                });
                cardsPos.forEach(card => {
                    const pos = card.getAttribute('data-pos');
                    if(pos) {
                        card.onclick = () => moveAndSpeak(pos);
                    }
                });
                // ضبط الوضع الابتدائي (أمام)
                window.moveBird('front');
            }, 100);
        }
    }
    
    function next() { if(currentSlide < total-1){ currentSlide++; renderSlide(); updateUI(); } }
    function prev() { if(currentSlide > 0){ currentSlide--; renderSlide(); updateUI(); } }
    
    prevBtn.addEventListener("click", prev);
    nextBtn.addEventListener("click", next);
    window.speakText = speakText;
    window.animateBalls = window.animateBalls;

="R"> R</label><label><input type="radio" name="q7" value="P"> P</label></div></div><div class="question"><strong>8. "أعلى" بالإنجليزية؟</strong><div><label><input type="radio" name="q8" value="above"> above</label><label><input type="radio" name="q8" value="below"> below</label></div></div><button type="button" id="submitQuiz">تصحيح</button></form><div id="quizResult" class="result" style="font-size:1.5rem;margin-top:1rem;"></div><button onclick="window.close()">إغلاق</button></div><script>document.getElementById('submitQuiz').onclick=function(){let s=0;if(document.querySelector('input[name="q1"]:checked')?.value==='behind') s++;if(document.querySelector('input[name="q2"]:checked')?.value==='15') s++;if(document.querySelector('input[name="q3"]:checked')?.value==='قِ') s++;if(document.querySelector('input[name="q4"]:checked')?.value==='kitchen') s++;if(document.querySelector('input[name="q5"]:checked')?.value==='دفع') s++;if(document.querySelector('input[name="q6"]:checked')?.value==='wood') s++;if(document.querySelector('input[name="q7"]:checked')?.value==='R') s++;if(document.querySelector('input[name="q8"]:checked')?.value==='above') s++;document.getElementById('quizResult').innerHTML='✅ نتيجتك: '+s+' من 8';};<\/script></body></html>`);
        quizWindow.document.close();
    });
    
    renderSlide();
    updateUI();
</script>
