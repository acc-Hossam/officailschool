<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover"
    />
    <title>دروس تفاعلية | العد بالكرات والعصفور المتحرك</title>
    <!-- Google Fonts & Font Awesome -->
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(145deg, #0a2f2a, #04382c);
        font-family: "Tajawal", "Amiri", serif;
        min-height: 100vh;
        padding: 1rem;
      }

      .presentation-container {
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
        background: rgba(255, 248, 225, 0.96);
        border-radius: 48px 32px 48px 32px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        border: 1px solid #e9c891;
      }

      .islamic-header {
        background: #1e3a2f;
        padding: 0.8rem 1.5rem;
        text-align: center;
        border-bottom: 3px solid #d4af37;
      }

      .islamic-header h2 {
        color: #f9eec1;
        font-family: "Amiri", serif;
        font-weight: 700;
        font-size: 1.3rem;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .islamic-header h2 i {
        font-size: 1.3rem;
        color: #f5bc70;
      }

      .slide-area {
        padding: 1rem;
        background: #fffef7;
      }

      .slide-card {
        background: linear-gradient(135deg, #ffffff, #fef7e0);
        border-radius: 36px;
        padding: 1.2rem;
        box-shadow: 0 15px 30px -8px rgba(0, 0, 0, 0.15);
        border-right: 6px solid #c2a155;
        animation: slideFadeUp 0.4s ease forwards;
      }

      @keyframes slideFadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .section-title {
        font-size: 1.4rem;
        font-weight: 800;
        color: #2d5a3b;
        border-right: 5px solid #e6b45e;
        padding-right: 0.8rem;
        margin-bottom: 1.2rem;
        display: inline-block;
      }

      /* تنسيق شريحة الرياضيات */
      .math-container {
        text-align: center;
      }

      .number-box {
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
        margin: 1.5rem 0;
      }

      .num-card {
        background: #fef2dc;
        width: 100px;
        padding: 0.8rem;
        border-radius: 50px;
        text-align: center;
        font-size: 2rem;
        font-weight: bold;
        transition: all 0.2s;
        cursor: pointer;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        border: 2px solid #e9c284;
      }

      .num-card:hover {
        transform: scale(1.05);
        background: #ffefc0;
      }

      .balls-animation-area {
        background: #e9dbc2;
        border-radius: 50px;
        padding: 1rem;
        margin-top: 1rem;
        text-align: center;
        min-height: 150px;
      }

      .ball-counter {
        font-size: 1.2rem;
        font-weight: bold;
        color: #2b5e42;
        margin-bottom: 12px;
        background: #fff2df;
        display: inline-block;
        padding: 0.2rem 1rem;
        border-radius: 30px;
      }

      .balls-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-top: 10px;
        align-items: center;
      }

      .ball-item {
        font-size: 1.8rem;
        animation: bounceIn 0.2s ease forwards;
        display: inline-block;
      }

      @keyframes bounceIn {
        0% {
          transform: scale(0);
          opacity: 0;
        }

        80% {
          transform: scale(1.2);
        }

        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* تصميم بطاقات المفردات */
      .vocab-double-slide {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
        margin: 1rem 0;
      }

      .vocab-card-new {
        flex: 1;
        min-width: 250px;
        background-size: cover;
        background-position: center;
        border-radius: 36px;
        overflow: hidden;
        box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s ease;
      }

      .vocab-card-new:hover {
        transform: translateY(-4px);
      }

      .card-overlay {
        background: rgba(30, 40, 25, 0.75);
        backdrop-filter: blur(3px);
        padding: 1.2rem;
        border-radius: 36px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.8rem;
        min-height: 260px;
        justify-content: center;
      }

      .word-buttons {
        display: flex;
        gap: 0.8rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 0.3rem;
      }

      .btn-audio {
        background: #fef5e0;
        border: none;
        padding: 0.5rem 1.2rem;
        border-radius: 50px;
        font-weight: bold;
        font-size: 0.9rem;
        cursor: pointer;
        transition: 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: "Tajawal", sans-serif;
      }

      .btn-audio.arabic {
        background: #2b5e42;
        color: white;
        border-bottom: 2px solid #d4af37;
      }

      .btn-audio.english {
        background: #c9a87b;
        color: #1e3a2f;
      }

      .btn-audio:hover {
        transform: scale(1.02);
      }

      .word-title {
        font-size: 1.3rem;
        font-weight: bold;
        text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.5);
        color: white;
        text-align: center;
      }

      .english-word {
        font-size: 1.2rem;
      }

      .arabic-word {
        font-family: "Amiri", serif;
        font-size: 1.5rem;
      }

      /* شريحة العصفور */
      .positions-wrapper {
        display: flex;
        justify-content: center;
        gap: 0.8rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }

      .position-card {
        background: #fff2e0;
        border-radius: 25px;
        padding: 0.6rem;
        cursor: pointer;
        text-align: center;
        transition: 0.2s;
        min-width: 100px;
      }

      .position-card:hover {
        background: #ffefdb;
        transform: translateY(-2px);
      }

      .scene {
        position: relative;
        background: #fdf8ef;
        border-radius: 30px;
        padding: 1.5rem;
        min-height: 280px;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px solid #e9d6b0;
      }

      .box {
        width: 110px;
        height: 110px;
        background: #d4a373;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        font-weight: bold;
        color: white;
        box-shadow: 0 8px 0 #8b5a2b;
        z-index: 2;
        position: relative;
      }

      .bird {
        position: absolute;
        font-size: 3rem;
        transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        filter: drop-shadow(2px 3px 5px rgba(0, 0, 0, 0.2));
        z-index: 20;
        pointer-events: none;
      }

      .control-buttons {
        display: flex;
        justify-content: center;
        gap: 0.8rem;
        margin-top: 1rem;
        flex-wrap: wrap;
      }

      .pos-btn {
        background: #e6c99c;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 40px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        font-size: 0.85rem;
      }

      .pos-btn:hover {
        background: #d4b076;
      }

      /* الحروف */
      .letters-container {
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
        margin: 1rem 0;
      }

      .letter-box {
        background: #eddabc;
        padding: 0.8rem 1.5rem;
        border-radius: 50px;
        font-size: 2rem;
        font-weight: bold;
        cursor: pointer;
      }

      /* التنقل */
      .nav-controls {
        background: #e7dbbd;
        padding: 0.8rem 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn-nav {
        background: #2b5e42;
        border: none;
        padding: 8px 18px;
        border-radius: 50px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        font-size: 0.9rem;
      }

      .btn-nav:hover:not(:disabled) {
        background: #a9712c;
      }

      .btn-nav:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .page-indicator {
        background: #fff0cf;
        padding: 4px 15px;
        border-radius: 30px;
        font-weight: bold;
        font-size: 0.9rem;
      }

      .slide-dots {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 15px;
        flex-wrap: wrap;
      }

      .dot {
        width: 8px;
        height: 8px;
        background: #cbb775;
        border-radius: 50%;
        cursor: pointer;
      }

      .dot.active {
        background: #2b5e42;
        width: 20px;
        border-radius: 20px;
      }

      .quiz-link-btn {
        background: #d4a373;
        color: #1e3a2f;
        border: none;
        padding: 8px 20px;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        font-size: 0.9rem;
      }

      footer {
        text-align: center;
        background: #fff4e4;
        padding: 0.5rem;
        font-size: 0.7rem;
        color: #9b7a48;
      }

      /* تحسينات للشاشات الصغيرة */
      @media (max-width: 640px) {
        body {
          padding: 0.5rem;
        }

        .slide-card {
          padding: 0.8rem;
        }

        .num-card {
          width: 75px;
          font-size: 1.5rem;
          padding: 0.5rem;
        }

        .ball-item {
          font-size: 1.3rem;
        }

        .vocab-card-new {
          min-width: 200px;
        }

        .card-overlay {
          min-height: 220px;
          padding: 0.8rem;
        }

        .word-title {
          font-size: 1rem;
        }

        .arabic-word {
          font-size: 1.2rem;
        }

        .box {
          width: 85px;
          height: 85px;
          font-size: 1rem;
        }

        .bird {
          font-size: 2.2rem;
        }

        .scene {
          min-height: 220px;
          padding: 1rem;
        }

        .section-title {
          font-size: 1.2rem;
        }
      }

      /* تحسينات للتابلت */
      @media (min-width: 641px) and (max-width: 1024px) {
        .vocab-card-new {
          min-width: 280px;
        }

        .num-card {
          width: 110px;
          font-size: 2.2rem;
        }

        .box {
          width: 130px;
          height: 130px;
        }
      }
    </style>
  </head>

  <body>
    <div class="presentation-container">
      <div class="islamic-header">
        <h2>
          <i class="fas fa-chalkboard-user"></i> حقيبة المتعلم التفاعلية
          <i class="fas fa-star-of-life"></i>
        </h2>
      </div>
      <div class="slide-area" id="slideArea">
        <div id="slideContent" class="slide-card"></div>
        <div class="slide-dots" id="dotsContainer"></div>
      </div>
      <div class="nav-controls">
        <button class="btn-nav" id="prevBtn">
          <i class="fas fa-chevron-right"></i> السابق
        </button>
        <div class="page-indicator">
          <span id="currentIdx">1</span> / <span id="totalIdx">13</span>
        </div>
        <div style="display: flex; gap: 8px">
          <button class="quiz-link-btn" id="goToQuizBtn">
            <i class="fas fa-question-circle"></i> اختبار
          </button>
          <button class="btn-nav" id="nextBtn">
            التالي <i class="fas fa-chevron-left"></i>
          </button>
        </div>
      </div>
      <footer>
        ﴿ وَقُل رَّبِّ زِدْنِي عِلْمًا ﴾ | اضغط على الأرقام لرؤية الكرات |
        العصفور يتحرك عند الضغط
      </footer>
    </div>

    <script>
      // دالة النطق
      function speakText(text, lang) {
        if (!window.speechSynthesis) return;
        var utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang || "ar";
        utterance.rate = 0.85;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }

      // بيانات المفردات
      var exactWords = [
        {
          en: "Home",
          ar: "منزل",
          img: "https://img.icons8.com/fluency/400/home.png",
        },
        {
          en: "bedroom",
          ar: "غرفة نوم",
          img: "https://img.icons8.com/fluency/400/bedroom.png",
        },
        {
          en: "bathroom",
          ar: "حمام",
          img: "https://img.icons8.com/fluency/400/bathroom.png",
        },
        {
          en: "living room",
          ar: "غرفة المعيشة",
          img: "https://img.icons8.com/fluency/400/living-room.png",
        },
        {
          en: "Kitchen",
          ar: "مطبخ",
          img: "https://img.icons8.com/fluency/400/kitchen.png",
        },
        {
          en: "Bed",
          ar: "سرير",
          img: "https://img.icons8.com/fluency/400/bed.png",
        },
        {
          en: "metal",
          ar: "معدن",
          img: "https://img.icons8.com/fluency/400/metal.png",
        },
        {
          en: "fabric",
          ar: "قماش",
          img: "https://img.icons8.com/fluency/400/fabric.png",
        },
        {
          en: "paper",
          ar: "ورق",
          img: "https://img.icons8.com/fluency/400/paper.png",
        },
        {
          en: "wood",
          ar: "خشب",
          img: "https://img.icons8.com/fluency/400/wood.png",
        },
        {
          en: "plastic",
          ar: "بلاستيك",
          img: "https://img.icons8.com/fluency/400/plastic.png",
        },
        {
          en: "push",
          ar: "دفع",
          img: "https://img.icons8.com/fluency/400/push.png",
        },
        {
          en: "pull",
          ar: "سحب",
          img: "https://img.icons8.com/fluency/400/pull.png",
        },
        {
          en: "Toys",
          ar: "العاب",
          img: "https://img.icons8.com/fluency/400/toys.png",
        },
        {
          en: "doll",
          ar: "عروسة",
          img: "https://img.icons8.com/fluency/400/doll.png",
        },
        {
          en: "teddybear",
          ar: "دبدوب",
          img: "https://img.icons8.com/fluency/400/teddy-bear.png",
        },
      ];

      var vocabularySlides = [];
      for (var i = 0; i < exactWords.length; i += 2) {
        vocabularySlides.push([exactWords[i], exactWords[i + 1]]);
      }

      var slides = [
        {
          type: "hadith",
          content: {
            text: "من صام رمضان إيمانا وأحتسابا غفر له ما تقدم من ذنبه وما تأخر",
            narrator: "رواه البخاري ومسلم",
          },
        },
        {
          type: "arabicLetters",
          data: {
            letters: ["ف", "ك", "ق"],
            harakat: {
              ف: ["فَ", "فِ", "فُ"],
              ك: ["كَ", "كِ", "كُ"],
              ق: ["قَ", "قِ", "قُ"],
            },
            words: ["قفْل", "مكْتبة", "طقْس", "عُقْد"],
          },
        },
        { type: "math" },
        {
          type: "positionsWithBird",
          items: [
            { en: "Infront of", ar: "أمام", key: "front" },
            { en: "Behind", ar: "خلف", key: "behind" },
            { en: "Below", ar: "تحت", key: "below" },
            { en: "Above", ar: "أعلى", key: "above" },
          ],
        },
        { type: "lettersPQR", letters: ["Pp", "Qq", "Rr"] },
      ];

      for (var j = 0; j < vocabularySlides.length; j++) {
        slides.push({ type: "vocabDouble", pair: vocabularySlides[j] });
      }

      var currentSlide = 0;
      var total = slides.length;
      var slideContainer = document.getElementById("slideContent");
      var prevBtn = document.getElementById("prevBtn");
      var nextBtn = document.getElementById("nextBtn");
      var currentSpan = document.getElementById("currentIdx");
      var totalSpan = document.getElementById("totalIdx");
      var dotsDiv = document.getElementById("dotsContainer");
      var quizBtn = document.getElementById("goToQuizBtn");

      function updateUI() {
        currentSpan.innerText = currentSlide + 1;
        totalSpan.innerText = total;
        prevBtn.disabled = currentSlide === 0;
        nextBtn.disabled = currentSlide === total - 1;
        renderDots();
      }

      function renderDots() {
        dotsDiv.innerHTML = "";
        for (var i = 0; i < total; i++) {
          var dot = document.createElement("div");
          dot.classList.add("dot");
          if (i === currentSlide) dot.classList.add("active");
          dot.addEventListener(
            "click",
            (function (idx) {
              return function () {
                if (idx !== currentSlide) {
                  currentSlide = idx;
                  renderSlide();
                  updateUI();
                }
              };
            })(i),
          );
          dotsDiv.appendChild(dot);
        }
      }

      function renderHadith(slide) {
        return (
          '<div style="text-align:center">' +
          '<i class="fas fa-mosque" style="font-size:2.5rem; color:#b8860b;"></i>' +
          '<div style="background:#fef5e0; border-radius:40px; padding:1rem; margin:0.8rem 0;">' +
          '<p style="font-size:1rem;">قال رسول الله ﷺ</p>' +
          '<p style="font-size:1.3rem; font-weight:bold;">“' +
          slide.content.text +
          "”</p>" +
          "<p>ﷺ</p>" +
          "</div>" +
          '<div><i class="fas fa-book"></i> ' +
          slide.content.narrator +
          "</div>" +
          '<div style="margin-top:12px;">صدق رسول الله صلى الله عليه وسلم</div>' +
          "</div>"
        );
      }

      function renderArabicLetters(slide) {
        var lettersArr = slide.data.letters;
        var harakatMap = slide.data.harakat;
        var lettersHtml =
          '<div><div class="section-title"><i class="fas fa-pen"></i> الحروف مع الحركات</div><div style="display:flex; flex-wrap:wrap; gap:1rem; justify-content:center; margin:1.5rem 0;">';
        for (var i = 0; i < lettersArr.length; i++) {
          var letter = lettersArr[i];
          var forms = "";
          for (var k = 0; k < harakatMap[letter].length; k++) {
            forms +=
              '<span style="background:#efe2cf; padding:0.3rem 0.8rem; border-radius:30px; margin:0 3px; font-size:1.3rem;">' +
              harakatMap[letter][k] +
              "</span>";
          }
          lettersHtml +=
            '<div style="background:#fff2e2; border-radius:30px; padding:0.8rem; text-align:center; min-width:110px;"><div style="font-size:2rem; font-weight:bold;">' +
            letter +
            "</div><div>" +
            forms +
            "</div></div>";
        }
        lettersHtml +=
          '</div><div class="section-title">📖 كلمات تطبيقية</div><div style="display:flex; gap:0.8rem; flex-wrap:wrap; justify-content:center;">';
        for (var w = 0; w < slide.data.words.length; w++) {
          var word = slide.data.words[w];
          lettersHtml +=
            '<div style="background:#f4e8d8; padding:0.4rem 1rem; border-radius:30px; cursor:pointer;" onclick="speakText(\'' +
            word +
            "','ar')\">" +
            word +
            "</div>";
        }
        lettersHtml += "</div></div>";
        return lettersHtml;
      }

      function renderMathSlide() {
        return (
          '<div class="math-container">' +
          '<div class="section-title">🔢 الأعداد وتمثيلها بالكرات</div>' +
          '<div class="number-box">' +
          '<div class="num-card" data-num="14">14</div>' +
          '<div class="num-card" data-num="15">15</div>' +
          '<div class="num-card" data-num="16">16</div>' +
          "</div>" +
          '<div class="balls-animation-area" id="ballsArea">' +
          '<div class="ball-counter" id="counterDisplay">⚽ اختر رقماً لعرض الكرات</div>' +
          '<div id="ballsContainer" class="balls-row"></div>' +
          "</div>" +
          "</div>"
        );
      }

      window.animateBalls = function (number) {
        var container = document.getElementById("ballsContainer");
        var counterSpan = document.getElementById("counterDisplay");
        if (!container) return;
        container.innerHTML = "";
        counterSpan.innerHTML = "🔄 جاري العد حتى " + number + " كرة ...";
        var i = 0;
        function addNextBall() {
          if (i < number) {
            var ballSpan = document.createElement("span");
            ballSpan.className = "ball-item";
            ballSpan.innerHTML = "⚽";
            container.appendChild(ballSpan);
            counterSpan.innerHTML = "✅ " + (i + 1) + " / " + number + " كرة";
            i++;
            setTimeout(addNextBall, 70);
          } else {
            counterSpan.innerHTML = "🎉 " + number + " كرة 🎉";
          }
        }
        addNextBall();
      };

      window.moveBirdToPosition = function (position) {
        var bird = document.getElementById("animatedBird");
        var box = document.querySelector(".box");
        var scene = document.getElementById("positionScene");
        if (!bird || !box || !scene) return;

        var boxRect = box.getBoundingClientRect();
        var sceneRect = scene.getBoundingClientRect();

        var boxCenterX = boxRect.left + boxRect.width / 2 - sceneRect.left;
        var boxCenterY = boxRect.top + boxRect.height / 2 - sceneRect.top;

        var topPos = 0,
          leftPos = 0,
          filterVal = "none",
          zIndexVal = 20;

        if (position === "front") {
          topPos = boxCenterY + 55;
          leftPos = boxCenterX - 22;
        } else if (position === "behind") {
          topPos = boxCenterY - 15;
          leftPos = boxCenterX - 22;
          filterVal = "brightness(0.5) blur(1px)";
          zIndexVal = 1;
        } else if (position === "below") {
          topPos = boxCenterY + 70;
          leftPos = boxCenterX - 22;
        } else if (position === "above") {
          topPos = boxCenterY - 70;
          leftPos = boxCenterX - 22;
        }

        bird.style.top = topPos + "px";
        bird.style.left = leftPos + "px";
        bird.style.filter = filterVal;
        bird.style.zIndex = zIndexVal;
      };

      function renderPositionsWithBird(slide) {
        var items = slide.items;
        var btnsHtml = "";
        var cardsHtml = "";
        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          var iconClass = "fa-arrow-right";
          if (item.key === "behind") iconClass = "fa-arrow-left";
          else if (item.key === "below") iconClass = "fa-arrow-down";
          else if (item.key === "above") iconClass = "fa-arrow-up";
          btnsHtml +=
            '<button class="pos-btn" data-pos="' +
            item.key +
            '">' +
            item.en +
            " (" +
            item.ar +
            ")</button>";
          cardsHtml +=
            '<div class="position-card" data-pos="' +
            item.key +
            '"><i class="fas ' +
            iconClass +
            '"></i><p>' +
            item.en +
            "<br>" +
            item.ar +
            "</p></div>";
        }

        return (
          "<div>" +
          '<div class="section-title"><i class="fas fa-map-pin"></i> أين العصفور؟ اضغط لتغيير وضعه</div>' +
          '<div class="positions-wrapper">' +

          "</div>" +
          '<div class="position-demo">' +

          '<div class="box">📦 صندوق</div>' +

          "</div>" +
          "</div>"
        );
      }

      function renderLettersPQR(slide) {
        var lettersHtml = "";
        for (var i = 0; i < slide.letters.length; i++) {
          lettersHtml +=
            '<div class="letter-box" onclick="speakText(\'' +
            slide.letters[i] +
            "','en')\">" +
            slide.letters[i] +

        return (
          '<div><div class="section-title">🔤 الحروف الإنجليزية</div>' +
          '<div class="letters-container">' +

          "</div>" +

          "</div>"
        );
      }

      function renderVocabDouble(slide) {
        var pair = slide.pair;
        var cardsHtml = "";
        for (var i = 0; i < pair.length; i++) {
          var item = pair[i];
          if (!item) continue;
          cardsHtml +=
            '<div class="vocab-card-new" style="background-image: url(\'' +
            item.img +
            "'); background-size: cover; background-position: center;\">" +
            '<div class="card-overlay">' +
            '<div class="word-title english-word">' +
            item.en +
            "</div>" +
            '<div class="word-title arabic-word">' +
            item.ar +
            "</div>" +
            '<div class="word-buttons">' +
            '<button class="btn-audio english" onclick="event.stopPropagation(); speakText(\'' +
            item.en +
            "','en')\">" +
            '<i class="fas fa-volume-up"></i> English</button>' +
            '<button class="btn-audio arabic" onclick="event.stopPropagation(); speakText(\'' +
            item.ar +
            "','ar')\">" +
            '<i class="fas fa-volume-up"></i> العربية</button>' +
            "</div>" +
            "</div>" +
            "</div>";
        }
        return (
          '<div><div class="section-title"><i class="fas fa-image"></i> المفردات المصورة</div>' +
          '<div class="vocab-double-slide">' +
          cardsHtml +

          "</div>"
        );
      }

      function renderSlide() {
        var slide = slides[currentSlide];
        var html = "";
        if (slide.type === "hadith") html = renderHadith(slide);
        else if (slide.type === "arabicLetters")
          html = renderArabicLetters(slide);
        else if (slide.type === "math") html = renderMathSlide();
        else if (slide.type === "positionsWithBird")
          html = renderPositionsWithBird(slide);
        else if (slide.type === "lettersPQR") html = renderLettersPQR(slide);
        else if (slide.type === "vocabDouble") html = renderVocabDouble(slide);

        slideContainer.style.animation = "none";
        slideContainer.innerHTML = html;
        setTimeout(function () {
          slideContainer.style.animation = "";
        }, 20);

        if (slide.type === "math") {
          var cards = document.querySelectorAll(".num-card");
          for (var i = 0; i < cards.length; i++) {
            var card = cards[i];
            var num = parseInt(card.getAttribute("data-num"));
            card.onclick = (function (n) {
              return function () {
                window.animateBalls(n);
                speakText(n + " كرة", "ar");
              };
            })(num);
          }
        }

        if (slide.type === "positionsWithBird") {
          setTimeout(function () {
            var btns = document.querySelectorAll(".pos-btn");
            var cardsPos = document.querySelectorAll(".position-card");

            var handleMove = function (pos) {
              var text = "";
              if (pos === "front") text = "Infront of أمام";
              else if (pos === "behind") text = "Behind خلف";
              else if (pos === "below") text = "Below تحت";
              else if (pos === "above") text = "Above أعلى";
              window.moveBirdToPosition(pos);
              speakText(text, "en");
            };

            for (var i = 0; i < btns.length; i++) {
              var btn = btns[i];
              var pos = btn.getAttribute("data-pos");
              btn.onclick = (function (p) {
                return function (e) {
                  e.stopPropagation();
                  handleMove(p);
                };
              })(pos);
            }

            for (var j = 0; j < cardsPos.length; j++) {
              var cardPos = cardsPos[j];
              var cardPosVal = cardPos.getAttribute("data-pos");
              if (cardPosVal) {
                cardPos.onclick = (function (p) {
                  return function () {
                    handleMove(p);
                  };
                })(cardPosVal);
              }
            }

            window.moveBirdToPosition("front");
          }, 150);
        }
      }

      function next() {
        if (currentSlide < total - 1) {
          currentSlide++;
          renderSlide();
          updateUI();
        }
      }

      function prev() {
        if (currentSlide > 0) {
          currentSlide--;
          renderSlide();
          updateUI();
        }
      }

      prevBtn.addEventListener("click", prev);
      nextBtn.addEventListener("click", next);
